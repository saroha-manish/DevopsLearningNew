name: CICDLearning

on:
  pull_request:
    branches: ["main"]
  push:
    branches: ["microservice/claims"]

env:
  REGISTRY: "docker.io"

jobs:
  # ── 1. Lint & Test ────────────────────────────────────────────────────────
  build-and-push:
    name: build-docker-image
    runs-on: ubuntu-latest

    steps:

      - name: Set sanitized branch name
        run: |
          # Extract branch name, lowercase it, and replace non-alphanumeric chars with '-'
          CLEAN_NAME=$(echo "${{ github.ref_name }}" | tr '[:upper:]' '[:lower:]' | sed 's/[^a-z0-9]/-/g')
          echo "IMAGE_NAME=$CLEAN_NAME" >> $GITHUB_ENV

      - name: Use sanitized name
        run: echo "The sanitized branch name is ${{ env.IMAGE_NAME }}"
    
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

  # ── 2. Build & Push Docker image ─────────────────────────────────────────
  # docker:
  #   name: Build & Push Docker Image
  #   runs-on: ubuntu-latest
  #   needs: build                      # only runs if tests pass
  #   if: github.event_name == 'pull_request'  # skip on PRs

  #   steps:
  #     - name: Checkout code
  #       uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3  # Adds Buildx support

      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          load: true  # Requires a builder (Buildx) to load into local store
          tags: ${{ env.BRANCH_NAME }}

      - name: Push Docker image
        run: docker push ${{ secrets.DOCKERHUB_USERNAME }}/my-repo:${{ env.BRANCH_NAME }}

